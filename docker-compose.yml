services:

  backend:
    build: .
    container_name: rag-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - /app/.venv

    env_file:
      - .env

    command: .venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


  frontend:
    build: .
    container_name: rag-frontend

    ports:
      - "8501:8501"

    volumes:
      - .:/app
      - /app/.venv

    env_file:
      - .env

    command: .venv/bin/python -m streamlit run app/ui/app.py --server.port 8501 --server.address 0.0.0.0